<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Internet at Home</title>
<link rel="icon" href="internet_monitor_icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="internet_monitor_icon.svg">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#F4FAFB;min-height:100vh;padding-bottom:32px;max-width:420px;margin:0 auto;color:#191C1D;}
.appbar{padding:24px 16px 12px;}
.appbar-title{font-size:22px;font-weight:500;color:#191C1D;margin-bottom:8px;}
.ip-chip{display:inline-flex;align-items:center;gap:7px;background:#DBE4E6;border-radius:8px;padding:5px 12px;font-size:12px;font-family:monospace;color:#3F4849;}
.ip-dot{width:8px;height:8px;border-radius:50%;background:#006E1C;flex-shrink:0;}
.status-card{margin:8px 16px 12px;border-radius:28px;padding:44px 24px 36px;text-align:center;transition:background 0.5s ease;}
.status-card.unknown{background:#DBE4E6;}
.status-card.checking{background:#E8DEF8;}
.status-card.online{background:#B7F0B8;}
.status-card.offline{background:#FFDAD6;}
.s-icon{font-size:68px;line-height:1;margin-bottom:18px;display:block;}
.s-label{font-size:38px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;}
.status-card.online .s-label{color:#006E1C;}
.status-card.offline .s-label{color:#BA1A1A;}
.status-card.checking .s-label{color:#4A4090;}
.status-card.unknown .s-label{color:#3F4849;}
.s-sub{font-size:14px;color:#49454F;line-height:1.5;}
.stats{display:flex;gap:8px;margin:0 16px 12px;}
.stat{flex:1;background:white;border-radius:16px;padding:14px 8px;text-align:center;border:0.5px solid #DBE4E6;}
.stat-val{font-size:19px;font-weight:600;color:#191C1D;}
.stat-lbl{font-size:11px;color:#6F797A;margin-top:3px;}
.card{margin:0 16px 12px;background:white;border-radius:16px;padding:16px;border:0.5px solid #DBE4E6;}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6F797A;margin-bottom:14px;}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.switch{position:relative;display:inline-block;width:48px;height:28px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#79747E;border-radius:14px;cursor:pointer;transition:background 0.25s;}
.slider:before{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:white;top:4px;left:4px;transition:transform 0.25s;}
input:checked+.slider{background:#006874;}
input:checked+.slider:before{transform:translateX(20px);}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:7px 18px;border-radius:8px;font-size:13px;border:1px solid #79747E;background:transparent;color:#191C1D;cursor:pointer;font-family:system-ui;transition:all 0.15s;}
.chip.on{background:#006874;color:white;border-color:#006874;}
.h-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #F0F4F4;}
.h-item:last-child{border-bottom:none;}
.h-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.h-dot.on{background:#006E1C;}.h-dot.off{background:#BA1A1A;}
.h-st{font-size:13px;font-weight:500;flex:1;}
.h-st.on{color:#006E1C;}.h-st.off{color:#BA1A1A;}
.h-ms{font-size:12px;color:#6F797A;min-width:54px;text-align:right;}
.h-t{font-size:12px;color:#9EABAC;min-width:64px;text-align:right;}
.empty{font-size:13px;color:#9EABAC;padding:4px 0;}
.fab{display:flex;align-items:center;justify-content:center;gap:10px;margin:4px 16px 0;padding:18px;background:#006874;color:white;border:none;border-radius:16px;font-size:15px;font-weight:600;cursor:pointer;width:calc(100% - 32px);font-family:system-ui;letter-spacing:0.2px;transition:opacity 0.15s,transform 0.1s;}
.fab:active{opacity:0.85;transform:scale(0.98);}
.fab:disabled{opacity:0.5;cursor:not-allowed;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;animation:spin 0.8s linear infinite;}
</style>
</head>
<body>

<div class="appbar">
  <div class="appbar-title">Internet at Home</div>
  <div class="ip-chip"><span class="ip-dot"></span>87.197.171.183</div>
</div>

<div class="status-card unknown" id="sc">
  <span class="s-icon" id="si">◌</span>
  <div class="s-label" id="sl">Ready</div>
  <div class="s-sub" id="ss">Tap Check Now to begin</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="vms">—</div><div class="stat-lbl">Ping (ms)</div></div>
  <div class="stat"><div class="stat-val" id="vup">—</div><div class="stat-lbl">Uptime</div></div>
  <div class="stat"><div class="stat-val" id="vlast">—</div><div class="stat-lbl">Last check</div></div>
</div>

<div class="card">
  <div class="card-title">Auto-refresh</div>
  <div class="row">
    <span style="font-size:14px;">Enabled</span>
    <label class="switch"><input type="checkbox" id="tog" checked onchange="toggleAuto()"><span class="slider"></span></label>
  </div>
  <div class="chips">
    <button class="chip" onclick="setIv(5,this)">5s</button>
    <button class="chip on" onclick="setIv(10,this)">10s</button>
    <button class="chip" onclick="setIv(30,this)">30s</button>
    <button class="chip" onclick="setIv(60,this)">1m</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Recent checks</div>
  <div id="hist"><div class="empty">No checks yet...</div></div>
</div>

<button class="fab" id="fab" onclick="chk()">
  <span id="fi">↻</span>&nbsp; Check Now
</button>

<script>
var IP='87.197.171.183', hist=[], tot=0, ups=0, ivMs=10000, tmr=null, busy=false;
function fmt(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
async function ping(){
  var t=performance.now(), ctrl=new AbortController(), to=setTimeout(function(){ctrl.abort();},5000);
  try{
    await fetch('https://dns.google/resolve?name='+IP+'&type=A&r='+Date.now(),{signal:ctrl.signal,cache:'no-store'});
    clearTimeout(to);
    return{ok:true,ms:Math.round(performance.now()-t)};
  }catch(e){clearTimeout(to);return{ok:false,ms:null};}
}
function render(r){
  var now=new Date();
  document.getElementById('sc').className='status-card '+(r.ok?'online':'offline');
  document.getElementById('si').textContent=r.ok?'✓':'✕';
  document.getElementById('sl').textContent=r.ok?'ONLINE':'OFFLINE';
  document.getElementById('ss').textContent=r.ok?'':'No response \u00b7 connection may be down';
  document.getElementById('vms').textContent=r.ms!==null?r.ms:'—';
  document.getElementById('vlast').textContent=fmt(now);
  tot++; if(r.ok)ups++;
  document.getElementById('vup').textContent=Math.round(ups/tot*100)+'%';
  hist.unshift({ok:r.ok,ms:r.ms,t:now});
  if(hist.length>8)hist.pop();
  var h=document.getElementById('hist');
  h.innerHTML=hist.map(function(x){
    return '<div class="h-item"><div class="h-dot '+(x.ok?'on':'off')+'"></div>'
      +'<div class="h-st '+(x.ok?'on':'off')+'">'+(x.ok?'Online':'Offline')+'</div>'
      +'<div class="h-ms">'+(x.ms!==null?x.ms+' ms':'timeout')+'</div>'
      +'<div class="h-t">'+fmt(x.t)+'</div></div>';
  }).join('');
}
async function chk(){
  if(busy)return; busy=true;
  var fab=document.getElementById('fab'); fab.disabled=true;
  document.getElementById('fi').innerHTML='<span class="spin">↻</span>';
  document.getElementById('sc').className='status-card checking';
  document.getElementById('sl').textContent='Checking\u2026';
  document.getElementById('si').textContent='◌';
  document.getElementById('ss').textContent='Pinging '+IP+'\u2026';
  var r=await ping(); render(r);
  busy=false; fab.disabled=false; document.getElementById('fi').textContent='↻';
}
function toggleAuto(){clearInterval(tmr);if(document.getElementById('tog').checked)tmr=setInterval(chk,ivMs);}
function setIv(s,el){
  ivMs=s*1000;
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
  clearInterval(tmr);
  if(document.getElementById('tog').checked)tmr=setInterval(chk,ivMs);
}
chk(); tmr=setInterval(chk,ivMs);
</script>
</body>
</html>
